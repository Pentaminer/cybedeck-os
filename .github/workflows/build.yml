name: Build Cyberdeck OS

on:
  workflow_dispatch: # Кнопка ручного запуска в браузере

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libssl-dev texinfo unzip bc rsync cpio

    - name: Download Buildroot
      run: |
        wget https://buildroot.org/downloads/buildroot-2026.02.tar.gz
        tar -xzf buildroot-2026.02.tar.gz
        mv buildroot-2026.02 buildroot

    - name: Configure with Custom Cyberdeck Defconfig
      run: |
        cd buildroot
        
        # Шаг 1: Используем точное имя дефолтного конфига под QEMU ARM VExpress
        make qemu_arm_vexpress_defconfig
        
        # Шаг 2: Дописываем наши кастомные опции (Lua, Графика, Терминал) в конец .config
        cat << 'EOF' >> .config
        
        # --- CYBERDECK CUSTOM EXTENSIONS ---
        BR2_PACKAGE_LUA=y
        BR2_PACKAGE_LUA_5_4=y
        BR2_PACKAGE_LUASOCKET=y
        BR2_PACKAGE_LUAFILESYSTEM=y
        BR2_PACKAGE_OPKG=y
        BR2_PACKAGE_TMUX=y
        BR2_PACKAGE_NANO=y
        BR2_PACKAGE_XORG7=y
        BR2_PACKAGE_XSERVER_XORG_SERVER=y
        BR2_PACKAGE_XSERVER_XORG_SERVER_MODULAR=y
        BR2_PACKAGE_XDRIVER_XF86_VIDEO_FBDEV=y
        BR2_PACKAGE_XDRIVER_XF86_INPUT_KEYBOARD=y
        BR2_PACKAGE_XDRIVER_XF86_INPUT_MOUSE=y
        BR2_PACKAGE_XDRIVER_XF86_INPUT_EVDEV=y
        BR2_PACKAGE_OPENBOX=y
        BR2_PACKAGE_XTERM=y
        BR2_PACKAGE_XINIT=y
        EOF
        
        # Шаг 3: Проверяем и обновляем получившийся конфиг
        make olddefconfig
        
    - name: Compile OS
      run: |
        cd buildroot
        make

    - name: Upload Finished Image
      uses: actions/upload-artifact@v4
      with:
        name: cyberdeck-os-image
        path: buildroot/output/images/
