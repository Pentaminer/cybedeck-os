name: Build Cyberdeck OS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libssl-dev texinfo unzip bc rsync cpio

    - name: Download Buildroot
      run: |
        wget https://buildroot.org/downloads/buildroot-2026.02.tar.gz
        tar -xzf buildroot-2026.02.tar.gz
        mv buildroot-2026.02 buildroot

    # КЭШ: Сохраняем и восстанавливаем всю папку сборки и загруженные исходники
    - name: Cache Buildroot output
      uses: actions/cache@v4
      with:
        path: |
          buildroot/output
          buildroot/dl
        # Кэш привязан к твоему файлу дефконфига. Изменился конфиг — кэш обновится
        key: buildroot-${{ hashFiles('cyberdeck_defconfig') }}
        restore-keys: |
          buildroot-

    - name: Configure with Custom Cyberdeck Defconfig
      run: |
        cp ${{ github.workspace }}/cyberdeck_defconfig buildroot/configs/cyberdeck_defconfig
        cd buildroot
        make cyberdeck_defconfig

    - name: Compile OS
      run: |
        cd buildroot
        # Убрали linux-dirclean и лишний сброс конфига — собираем только новые пакеты
        make

    - name: Upload Finished Image
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cyberdeck-os-image
        path: buildroot/output/images/
