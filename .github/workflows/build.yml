name: Build Cyberdeck OS

on:
  workflow_dispatch: # Кнопка ручного запуска в браузере

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libssl-dev texinfo unzip bc rsync cpio

    - name: Download Buildroot
      run: |
        wget https://buildroot.org/downloads/buildroot-2026.02.tar.gz
        tar -xzf buildroot-2026.02.tar.gz
        mv buildroot-2026.02 buildroot

    - name: Configure with Custom Cyberdeck Defconfig
      run: |
        cd buildroot
        
        # 1. Загружаем чистый базовый конфиг платы QEMU VExpress
        make qemu_arm_vexpress_defconfig
        
        # 2. Принудительно включаем поддержку wchar, локалей и динамических библиотек в тулчейне
        # Без этого X.Org и графические библиотеки вообще аппаратно заблокированы в Buildroot
        sed -i 's/# BR2_TOOLCHAIN_BUILDROOT_WCHAR is not set/BR2_TOOLCHAIN_BUILDROOT_WCHAR=y/' .config
        sed -i 's/# BR2_ENABLE_LOCALE is not set/BR2_ENABLE_LOCALE=y/' .config
        
        # 3. Вшиваем наши современные пакеты со всеми их родительскими зависимостями
        cat << 'EOF' >> .config
        
        # Кастомная начинка Cyberdeck
        BR2_PACKAGE_LUA=y
        BR2_PACKAGE_LUA_5_4=y
        BR2_PACKAGE_LUASOCKET=y
        BR2_PACKAGE_LUAFILESYSTEM=y
        BR2_PACKAGE_OPKG=y
        BR2_PACKAGE_TMUX=y
        BR2_PACKAGE_NANO=y
        
        # Включаем графическую подсистему X11 и зависимости
        BR2_PACKAGE_XORG7=y
        BR2_PACKAGE_XSERVER_XORG_SERVER=y
        BR2_PACKAGE_XSERVER_XORG_SERVER_MODULAR=y
        BR2_PACKAGE_XDRIVER_XF86_VIDEO_FBDEV=y
        BR2_PACKAGE_XDRIVER_XF86_INPUT_KEYBOARD=y
        BR2_PACKAGE_XDRIVER_XF86_INPUT_MOUSE=y
        BR2_PACKAGE_XDRIVER_XF86_INPUT_EVDEV=y
        
        # Оконный менеджер и терминал
        BR2_PACKAGE_OPENBOX=y
        BR2_PACKAGE_XTERM=y
        BR2_PACKAGE_XINIT=y
        EOF
        
        # 4. Даем Buildroot команду «переварить» конфиг и автоматически расставить всё остальное
        make olddefconfig
        
    - name: Compile OS
      run: |
        cd buildroot
        make

    - name: Upload Finished Image
      uses: actions/upload-artifact@v4
      with:
        name: cyberdeck-os-image
        path: buildroot/output/images/
